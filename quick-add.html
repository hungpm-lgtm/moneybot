<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3D7D78">
<title>Ghi nhanh</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root {
  --teal: #5EA09B;
  --teal-dark: #3D7D78;
  --teal-lite: #E4F3F2;
  --cream: #EDE7DC;
  --white: #FFFFFF;
  --pink: #E4969E;
  --gray: #787068;
  --gray-lite: #F0EBE3;
  --text: #282018;
  --font: 'Be Vietnam Pro', sans-serif;
  --r: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--font); background: var(--cream);
  min-height: 100dvh; display: flex; flex-direction: column;
  position: fixed; inset: 0; overflow: hidden;
}

/* ── Header ── */
.header {
  background: linear-gradient(150deg, #3D7D78 0%, #5EA09B 100%);
  padding-top: calc(env(safe-area-inset-top, 0px) + 10px);
  padding: calc(env(safe-area-inset-top, 0px) + 10px) 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden; flex-shrink: 0;
}
.header::before {
  content:''; position:absolute; width:140px; height:140px;
  background:rgba(255,255,255,0.08); border-radius:50%;
  top:-60px; right:-30px;
}
.header-left { display:flex; align-items:center; gap:8px; position:relative; z-index:1; }
.header-icon { width:34px; height:34px; background:rgba(255,255,255,0.20); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.header-title { font-size:15px; font-weight:800; color:#fff; line-height:1.1; }
.header-sub { font-size:10px; color:rgba(255,255,255,0.7); margin-top:1px; }
.header-right { display:flex; align-items:center; gap:6px; position:relative; z-index:1; }
.sync-badge {
  display:flex; align-items:center; gap:4px;
  background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.25);
  color:#fff; font-size:10px; font-weight:600;
  padding:4px 8px; border-radius:14px;
}
.sync-dot { width:6px; height:6px; border-radius:50%; }
.sync-dot.synced { background:#22C55E; }
.sync-dot.syncing { background:#FBBF24; animation:pulse 1s infinite; }
.sync-dot.error { background:#E4969E; }
.sync-dot.offline { background:#9CA3AF; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.open-app-btn, .save-corner {
  background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.3);
  color:#fff; font-family:var(--font); font-size:11px; font-weight:700;
  padding:5px 10px; border-radius:14px; text-decoration:none;
  backdrop-filter:blur(8px); cursor:pointer;
}
.save-corner { background:#fff; color:var(--teal-dark); border-color:#fff; }
.save-corner:disabled { opacity:0.5; cursor:not-allowed; }

/* ── Content (no scroll, fit screen) ── */
.content {
  flex:1; padding:10px 14px 12px;
  display:flex; flex-direction:column; gap:10px;
  overflow-y:auto; scrollbar-width:none;
}
.content::-webkit-scrollbar { display:none; }
.section-label {
  font-size:9px; font-weight:800; color:var(--gray);
  letter-spacing:0.6px; text-transform:uppercase; margin-bottom:5px;
}

/* ── Wallet chips ── */
.wallet-row { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.wallet-row::-webkit-scrollbar { display:none; }
.w-chip {
  flex-shrink:0; padding:8px 12px; border-radius:12px;
  background:var(--white); border:2px solid transparent;
  display:flex; align-items:center; gap:6px; cursor:pointer;
  box-shadow:0 1px 6px rgba(80,65,50,0.06); transition:all 0.15s;
}
.w-chip:active { transform:scale(0.96); }
.w-chip.selected { border-color:var(--teal); background:var(--teal-lite); }
.w-chip-icon { font-size:16px; }
.w-chip-info { display:flex; flex-direction:column; line-height:1.1; }
.w-chip-name { font-size:11px; font-weight:700; color:var(--text); white-space:nowrap; max-width:90px; overflow:hidden; text-overflow:ellipsis; }
.w-chip-bal { font-size:10px; font-weight:600; color:var(--gray); margin-top:1px; }

/* ── Category grid (4 cols, compact) ── */
.cat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
.cat-btn {
  background:var(--white); border:2px solid transparent;
  border-radius:12px; padding:8px 4px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer; transition:all 0.15s; box-shadow:0 1px 6px rgba(80,65,50,0.06);
  user-select:none;
}
.cat-btn:active { transform:scale(0.95); }
.cat-btn.selected { background:var(--teal-lite); border-color:var(--teal); }
.cat-btn .icon { font-size:20px; }
.cat-btn .name {
  font-size:9px; font-weight:700; color:var(--gray);
  text-align:center; line-height:1.15;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.cat-btn.selected .name { color:var(--teal-dark); }

/* ── Amount input ── */
.amount-wrap { background:var(--white); border-radius:var(--r); padding:10px 14px; box-shadow:0 1px 6px rgba(80,65,50,0.06); }
.amount-input {
  width:100%; border:none; outline:none;
  font-family:var(--font); font-size:24px; font-weight:800;
  color:var(--text); text-align:right; background:transparent;
  letter-spacing:-0.5px;
}
.amount-suffix {
  font-size:12px; color:var(--gray); font-weight:700;
  text-align:right; margin-top:-4px;
}
.quick-amts { display:flex; gap:5px; margin-top:8px; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; }
.quick-amts::-webkit-scrollbar { display:none; }
.qa-btn {
  flex:1; min-width:48px; padding:7px 0;
  background:var(--gray-lite); border:1.5px solid transparent;
  border-radius:10px; font-family:var(--font); font-size:11px;
  font-weight:700; color:var(--gray); cursor:pointer;
  transition:all 0.15s; white-space:nowrap;
}
.qa-btn:active { transform:scale(0.94); background:var(--teal-lite); border-color:var(--teal); color:var(--teal-dark); }

/* ── Note ── */
.note-input {
  width:100%; padding:9px 12px; background:var(--white);
  border:2px solid transparent; border-radius:var(--r);
  font-family:var(--font); font-size:13px; color:var(--text);
  outline:none; box-shadow:0 1px 6px rgba(80,65,50,0.06);
}
.note-input:focus { border-color:var(--teal); }
.note-input::placeholder { color:#B0A898; }

/* ── Autosave indicator ── */
.auto-hint {
  font-size:11px; color:var(--gray); text-align:center;
  font-weight:600; padding:6px 8px;
  background:rgba(94,160,155,0.10); border-radius:10px;
}
.auto-hint.ready { background:rgba(94,160,155,0.20); color:var(--teal-dark); }
.auto-hint.saving { background:#FFF2D5; color:#C08000; }

/* ── Success/Error overlay ── */
.success-overlay {
  position:fixed; inset:0; background:rgba(61,125,120,0.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.success-overlay.show { opacity:1; pointer-events:auto; }
.success-check { font-size:64px; margin-bottom:8px; animation:pop 0.3s ease; }
.success-text { font-size:16px; font-weight:800; color:#fff; }
.success-sub { font-size:12px; color:rgba(255,255,255,0.85); font-weight:600; margin-top:4px; }
@keyframes pop { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }

.loading-overlay {
  position:fixed; inset:0; background:rgba(237,231,220,0.95);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:998; opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.loading-overlay.show { opacity:1; pointer-events:auto; }
.spinner {
  width:32px; height:32px; border:3px solid var(--teal-lite);
  border-top-color:var(--teal-dark); border-radius:50%;
  animation:spin 0.7s linear infinite; margin-bottom:8px;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">⚡</div>
    <div>
      <div class="header-title">Ghi nhanh</div>
      <div class="header-sub" id="autoSub">Tự lưu khi đủ thông tin</div>
    </div>
  </div>
  <div class="header-right">
    <div class="sync-badge" id="syncBadge"><div class="sync-dot offline"></div><span>...</span></div>
    <button class="save-corner" id="saveBtn" onclick="save()" disabled>✓ Lưu</button>
    <a href="rolly-finance-app.html" class="open-app-btn">App↗</a>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--gray);font-weight:600;">Đang đồng bộ...</div>
</div>

<div class="content">

  <!-- Ví -->
  <div>
    <div class="section-label">Ví trừ tiền</div>
    <div class="wallet-row" id="walletRow"></div>
  </div>

  <!-- Danh mục -->
  <div>
    <div class="section-label">Danh mục chi</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- Số tiền -->
  <div>
    <div class="section-label">Số tiền (₫)</div>
    <div class="amount-wrap">
      <input class="amount-input" id="amtInput" type="text" inputmode="numeric" placeholder="000" autocomplete="off" value="000"/>
    </div>
    <div class="quick-amts">
      <button class="qa-btn" type="button" onclick="addAmt(10000)">+10k</button>
      <button class="qa-btn" type="button" onclick="addAmt(20000)">+20k</button>
      <button class="qa-btn" type="button" onclick="addAmt(50000)">+50k</button>
      <button class="qa-btn" type="button" onclick="addAmt(100000)">+100k</button>
      <button class="qa-btn" type="button" onclick="addAmt(500000)">+500k</button>
      <button class="qa-btn" type="button" onclick="addAmt(1000000)">+1tr</button>
    </div>
  </div>

  <!-- Ghi chú -->
  <input class="note-input" id="noteInput" placeholder="✏️ Ghi chú (tùy chọn)"/>

  <!-- Auto-save indicator -->
  <div class="auto-hint" id="autoHint">⌛ Chọn ví + danh mục + số tiền để tự lưu</div>

</div>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-check">✅</div>
  <div class="success-text" id="successText">Đã lưu!</div>
  <div class="success-sub" id="successSub"></div>
</div>

<script>
const STORE_KEY = 'moneybot_v1';
const DEFAULT_CATS = [
  {name:'Thức ăn & Đồ uống', icon:'🍽️', color:'#F472B6'},
  {name:'Giao thông', icon:'⛽', color:'#34D399'},
  {name:'Nhà', icon:'🏠', color:'#3B82F6'},
  {name:'Giải trí', icon:'🎮', color:'#FBBF24'},
  {name:'Mua sắm', icon:'🛍️', color:'#10B981'},
  {name:'Quà tặng', icon:'🎁', color:'#A78BFA'},
  {name:'Làm đẹp', icon:'💄', color:'#FB7185'},
  {name:'Y tế', icon:'🏥', color:'#22D3EE'},
  {name:'Học tập', icon:'📚', color:'#F59E0B'},
  {name:'Hóa đơn', icon:'🧾', color:'#6366F1'},
  {name:'Khác', icon:'📦', color:'#9CA3AF'},
];
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBFC3zt8kEI6aDO6d4NZcIx7r8KqU6xBJc",
  authDomain: "moneybot-fd2e2.firebaseapp.com",
  projectId: "moneybot-fd2e2",
  storageBucket: "moneybot-fd2e2.firebasestorage.app",
  messagingSenderId: "51757805010",
  appId: "1:51757805010:web:1c5087f0ad375c7ae5ec0b"
};

let fbAuth = null, fbStore = null, fbUser = null;
let _syncStatus = 'offline';
let db = null;
let selWalletId = null;
let selCat = null, selCatIcon = '';
let autoSaveTimer = null;
let isSaving = false;

/* ── Utils ── */
function pad(n){ return n<10?'0'+n:''+n; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function nowTimeStr(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function fmtAmt(n){ return Math.round(Math.abs(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtShort(n){
  if (n >= 1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'').replace('.',',')+'tỷ';
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'').replace('.',',')+'tr';
  if (n >= 1e3) return Math.round(n/1e3)+'k';
  return ''+n;
}
function walletBalance(wid){
  const w = db.wallets.find(x=>x.id===wid); if (!w) return 0;
  let bal = Number(w.initialBalance) || 0;
  db.transactions.forEach(t => {
    if (t.type==='income' && t.walletId===wid) bal += t.amount;
    else if (t.type==='expense' && t.walletId===wid) bal -= t.amount;
    else if (t.type==='transfer') {
      if (t.walletId===wid) bal -= t.amount;
      if (t.toWalletId===wid) bal += t.amount;
    }
  });
  return bal;
}

/* ── Load/Save ── */
function loadDB(){
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) db = JSON.parse(raw); } catch(e){}
  if (!db) db = { wallets:[], transactions:[], categories:{expense:DEFAULT_CATS,income:[]}, settings:{} };
  db.wallets = db.wallets || [];
  db.transactions = db.transactions || [];
  db.categories = db.categories || {expense:DEFAULT_CATS, income:[]};
  if (!db.categories.expense || !db.categories.expense.length) db.categories.expense = DEFAULT_CATS;
  if (db.wallets.length === 0) {
    const w = {id:'w1', name:'Ví của tôi', icon:'💼', currency:'VND', initialBalance:0};
    db.wallets.push(w); db.settings.activeWalletId = w.id;
  }
  selWalletId = db.settings.activeWalletId || db.wallets[0].id;
}
function saveDB(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(db)); } catch(e){} }

/* ── Render ── */
function renderWallets(){
  const row = document.getElementById('walletRow');
  row.innerHTML = db.wallets.map(w => {
    const bal = walletBalance(w.id);
    return `<div class="w-chip ${selWalletId===w.id?'selected':''}" onclick="selWallet('${w.id}')">
      <span class="w-chip-icon">${w.icon||'💼'}</span>
      <div class="w-chip-info">
        <div class="w-chip-name">${w.name}</div>
        <div class="w-chip-bal">${fmtShort(bal)} ₫</div>
      </div>
    </div>`;
  }).join('');
}
function renderCats(){
  const cats = db.categories.expense || DEFAULT_CATS;
  const grid = document.getElementById('catGrid');
  grid.innerHTML = cats.map(c =>
    `<div class="cat-btn ${selCat===c.name?'selected':''}" onclick="selectCat('${encodeURIComponent(c.name)}','${encodeURIComponent(c.icon)}')">
      <span class="icon">${c.icon}</span>
      <span class="name">${c.name}</span>
    </div>`
  ).join('');
}
function updateSyncBadge(){
  const labels = { offline:'Cục bộ', syncing:'Sync...', synced:'Đã sync', error:'Lỗi' };
  document.getElementById('syncBadge').innerHTML = `<div class="sync-dot ${_syncStatus}"></div><span>${labels[_syncStatus]||''}</span>`;
}

/* ── Selections ── */
function selWallet(wid){ selWalletId = wid; renderWallets(); checkAutoSave(); }
function selectCat(enc, iconEnc){
  selCat = decodeURIComponent(enc);
  selCatIcon = decodeURIComponent(iconEnc);
  renderCats(); checkAutoSave();
}

/* ── Amount input (giống trang chính: 000 prefill, dấu chấm) ── */
const amtEl = document.getElementById('amtInput');
amtEl.addEventListener('focus', function(){
  if (this.value === '000') setTimeout(() => { try { this.setSelectionRange(0,0); } catch(e){} }, 50);
});
amtEl.addEventListener('keydown', function(e){
  const allow = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End','Enter'];
  if (allow.includes(e.key)) return;
  if (e.key >= '0' && e.key <= '9') return;
  e.preventDefault();
});
amtEl.addEventListener('input', function(){
  const raw = this.value.replace(/\./g,'').replace(/\D/g,'');
  if (!raw || raw === '0' || raw === '00' || raw === '000') {
    // giữ nguyên khi đang gõ đầu
  } else {
    const n = parseInt(raw, 10);
    if (n) this.value = n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }
  checkAutoSave();
});
amtEl.addEventListener('blur', function(){
  const raw = this.value.replace(/\./g,'').replace(/\D/g,'');
  if (!raw || raw === '0' || raw === '00' || raw === '000') { this.value = '000'; return; }
  const n = parseInt(raw, 10);
  this.value = n > 0 ? n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.') : '000';
});
function addAmt(delta){
  const raw = amtEl.value.replace(/\./g,'').replace(/\D/g,'');
  let cur = parseInt(raw, 10) || 0;
  if (raw === '000' || raw === '00' || raw === '0') cur = 0;
  cur += delta;
  amtEl.value = cur.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  checkAutoSave();
}
function currentAmt(){
  const raw = amtEl.value.replace(/\./g,'').replace(/\D/g,'');
  if (!raw || raw === '000' || raw === '00' || raw === '0') return 0;
  return parseInt(raw, 10) || 0;
}

/* ── Auto-save logic ── */
function checkAutoSave(){
  const amt = currentAmt();
  const ready = selWalletId && selCat && amt > 0;
  document.getElementById('saveBtn').disabled = !ready;
  const hint = document.getElementById('autoHint');
  if (isSaving) {
    hint.textContent = '💾 Đang lưu...'; hint.className = 'auto-hint saving';
    return;
  }
  if (!ready) {
    const missing = [];
    if (!selWalletId) missing.push('ví');
    if (!selCat) missing.push('danh mục');
    if (amt <= 0) missing.push('số tiền');
    hint.textContent = '⌛ Chưa đủ: ' + missing.join(', ');
    hint.className = 'auto-hint';
  } else {
    hint.textContent = '✓ Sẵn sàng — tự lưu sau 1s, hoặc bấm Lưu';
    hint.className = 'auto-hint ready';
    // Debounce auto-save
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => save(), 1000);
  }
}

/* ── Save ── */
function save(){
  if (isSaving) return;
  if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }
  const amt = currentAmt();
  if (!selWalletId || !selCat || amt <= 0) return;
  isSaving = true;
  const note = document.getElementById('noteInput').value.trim();
  const tx = {
    id: uid(),
    walletId: selWalletId,
    type: 'expense',
    amount: amt,
    category: selCat,
    note: note,
    date: todayStr(),
    time: nowTimeStr()
  };
  db.transactions.push(tx);
  db.settings.activeWalletId = selWalletId;
  saveDB();
  if (fbUser) pushCloud();
  showSuccess(amt, note);
  // Reset (giữ ví)
  selCat = null; selCatIcon = '';
  document.getElementById('amtInput').value = '000';
  document.getElementById('noteInput').value = '';
  setTimeout(() => {
    isSaving = false;
    renderCats(); renderWallets(); checkAutoSave();
  }, 1200);
}
function showSuccess(amt, note){
  document.getElementById('successText').textContent = '✓ Đã lưu ₫' + fmtAmt(amt);
  document.getElementById('successSub').textContent = selCat + (note ? ' · ' + note : '') + ' · ' + nowTimeStr();
  const ov = document.getElementById('successOverlay');
  ov.classList.add('show');
  setTimeout(() => ov.classList.remove('show'), 1100);
}

/* ── Firebase sync ── */
async function pullCloud(showLoad = true){
  if (!fbUser || !fbStore) return;
  if (showLoad) document.getElementById('loadingOverlay').classList.add('show');
  _syncStatus = 'syncing'; updateSyncBadge();
  try {
    const ref = fbStore.collection('users').doc(fbUser.uid).collection('app').doc('data');
    const snap = await ref.get();
    if (snap.exists) {
      const d = snap.data();
      if (d && d.db) {
        db = d.db;
        db.wallets = db.wallets || [];
        db.transactions = db.transactions || [];
        db.categories = db.categories || {expense:DEFAULT_CATS, income:[]};
        if (!db.categories.expense || !db.categories.expense.length) db.categories.expense = DEFAULT_CATS;
        db.settings = db.settings || {};
        if (db.wallets.length === 0) {
          const w = {id:'w1', name:'Ví của tôi', icon:'💼', currency:'VND', initialBalance:0};
          db.wallets.push(w); db.settings.activeWalletId = w.id;
        }
        selWalletId = db.settings.activeWalletId || db.wallets[0].id;
        saveDB();
      }
    }
    _syncStatus = 'synced';
  } catch(e) {
    console.warn('Pull error:', e);
    _syncStatus = 'error';
  }
  if (showLoad) document.getElementById('loadingOverlay').classList.remove('show');
  updateSyncBadge();
  renderWallets(); renderCats(); checkAutoSave();
}
async function pushCloud(){
  if (!fbUser || !fbStore) return;
  _syncStatus = 'syncing'; updateSyncBadge();
  try {
    const ref = fbStore.collection('users').doc(fbUser.uid).collection('app').doc('data');
    await ref.set({
      db: JSON.parse(JSON.stringify(db)),
      updatedAtMs: Date.now(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    _syncStatus = 'synced';
  } catch(e) { console.warn('Push error:', e); _syncStatus = 'error'; }
  updateSyncBadge();
}
function initFirebase(){
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth = firebase.auth();
    fbStore = firebase.firestore();
    fbAuth.onAuthStateChanged(async user => {
      fbUser = user;
      if (user) await pullCloud(true);
      else { _syncStatus = 'offline'; updateSyncBadge(); }
    });
  } catch(e) { _syncStatus = 'error'; updateSyncBadge(); }
}

/* ── Khởi động ── */
loadDB();
renderWallets();
renderCats();
updateSyncBadge();
checkAutoSave();
initFirebase();
</script>
</body>
</html>
