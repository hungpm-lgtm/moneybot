<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3D7D78">
<title>⚡ Lưu nhanh</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Be Vietnam Pro',sans-serif;
  background:linear-gradient(135deg,#3D7D78 0%,#5EA09B 100%);
  min-height:100dvh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:20px;
  color:#fff; text-align:center;
}
.icon { font-size:80px; margin-bottom:16px; animation:pop 0.4s ease; }
.title { font-size:24px; font-weight:800; margin-bottom:6px; }
.amount { font-size:36px; font-weight:800; margin:8px 0; letter-spacing:-1px; }
.detail { font-size:14px; opacity:0.85; font-weight:500; margin-bottom:24px; }
.spinner {
  width:32px; height:32px; border:3px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%;
  animation:spin 0.7s linear infinite; margin-bottom:12px;
}
.error { color:#FFD0D0; }
.btn-row { display:flex; gap:10px; margin-top:20px; }
.btn {
  background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4);
  color:#fff; padding:10px 18px; border-radius:14px;
  font-family:inherit; font-size:13px; font-weight:700; cursor:pointer;
  text-decoration:none; backdrop-filter:blur(8px);
}
.btn-primary { background:#fff; color:#3D7D78; border-color:#fff; }
@keyframes pop { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
@keyframes spin { to{transform:rotate(360deg)} }
.hint { font-size:11px; opacity:0.7; margin-top:14px; }
</style>
</head>
<body>
<div id="root"><div class="spinner"></div><div>Đang xử lý...</div></div>

<script>
const STORE_KEY = 'moneybot_v1';
const FB = {
  apiKey:"AIzaSyBFC3zt8kEI6aDO6d4NZcIx7r8KqU6xBJc",
  authDomain:"moneybot-fd2e2.firebaseapp.com",
  projectId:"moneybot-fd2e2",
  storageBucket:"moneybot-fd2e2.firebasestorage.app",
  messagingSenderId:"51757805010",
  appId:"1:51757805010:web:1c5087f0ad375c7ae5ec0b"
};
const DEFAULT_CATS = [
  {name:'Thức ăn & Đồ uống', icon:'🍽️'},{name:'Giao thông', icon:'⛽'},
  {name:'Nhà', icon:'🏠'},{name:'Giải trí', icon:'🎮'},
  {name:'Mua sắm', icon:'🛍️'},{name:'Quà tặng', icon:'🎁'},
  {name:'Làm đẹp', icon:'💄'},{name:'Y tế', icon:'🏥'},
  {name:'Học tập', icon:'📚'},{name:'Hóa đơn', icon:'🧾'},{name:'Khác', icon:'📦'},
];

const $ = id => document.getElementById(id);
const pad = n => n<10?'0'+n:''+n;
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr = () => { const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); };
const fmt = n => '₫'+Math.round(Math.abs(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');

function showResult(html){ $('root').innerHTML = html; }

function loadDB(){
  let db = null;
  try { const r = localStorage.getItem(STORE_KEY); if (r) db = JSON.parse(r); } catch(e){}
  if (!db) db = { wallets:[], transactions:[], categories:{expense:DEFAULT_CATS}, settings:{} };
  db.wallets = db.wallets || [];
  db.transactions = db.transactions || [];
  db.categories = db.categories || {expense:DEFAULT_CATS};
  if (!db.categories.expense || !db.categories.expense.length) db.categories.expense = DEFAULT_CATS;
  return db;
}
function saveDB(db){ try { localStorage.setItem(STORE_KEY, JSON.stringify(db)); } catch(e){} }

function showError(msg){
  showResult(`<div class="icon">⚠️</div>
    <div class="title">Không lưu được</div>
    <div class="detail error">${msg}</div>
    <div class="btn-row">
      <a href="quick-add.html" class="btn btn-primary">Ghi nhanh</a>
      <a href="rolly-finance-app.html" class="btn">Mở app</a>
    </div>`);
}

async function pushCloud(db, fbUser, fbStore){
  if (!fbUser || !fbStore) return;
  const ref = fbStore.collection('users').doc(fbUser.uid).collection('app').doc('data');
  await ref.set({
    db: JSON.parse(JSON.stringify(db)),
    updatedAtMs: Date.now(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}
async function pullCloud(fbUser, fbStore){
  if (!fbUser || !fbStore) return null;
  const ref = fbStore.collection('users').doc(fbUser.uid).collection('app').doc('data');
  const snap = await ref.get();
  if (snap.exists) {
    const d = snap.data();
    if (d && d.db) return d.db;
  }
  return null;
}

async function run(){
  const params = new URLSearchParams(location.search);
  const wParam = params.get('w');            // wallet: id, name hoặc 'active'
  const cParam = params.get('c');            // category name (URI encoded)
  const aParam = params.get('a');            // amount (số nguyên)
  const noteParam = params.get('note') || '';
  const typeParam = params.get('t') || 'expense'; // expense | income

  if (!cParam || !aParam) {
    return showError('Thiếu thông tin: cần "c" (danh mục) và "a" (số tiền) trong URL.');
  }
  const amount = parseInt(String(aParam).replace(/\D/g,''), 10);
  if (!amount || amount <= 0) return showError('Số tiền không hợp lệ.');
  const category = decodeURIComponent(cParam);
  const note = decodeURIComponent(noteParam);
  const type = (typeParam === 'income') ? 'income' : 'expense';

  // Init Firebase
  let fbAuth, fbStore, fbUser = null;
  try {
    firebase.initializeApp(FB);
    fbAuth = firebase.auth();
    fbStore = firebase.firestore();
  } catch(e){}

  // Đợi auth state (Firebase persist - thường có sẵn nếu đã login)
  fbUser = await new Promise(resolve => {
    if (!fbAuth) return resolve(null);
    const unsub = fbAuth.onAuthStateChanged(u => { unsub(); resolve(u); });
    setTimeout(() => resolve(null), 3000); // timeout 3s
  });

  // Load DB: nếu có cloud → ưu tiên cloud (để có ví mới nhất)
  let db = loadDB();
  if (fbUser && fbStore) {
    try {
      const cloud = await pullCloud(fbUser, fbStore);
      if (cloud) {
        db = cloud;
        db.wallets = db.wallets || [];
        db.transactions = db.transactions || [];
        db.categories = db.categories || {expense:DEFAULT_CATS};
      }
    } catch(e){}
  }
  if (db.wallets.length === 0) {
    return showError('Chưa có ví nào. Mở app để tạo ví trước.');
  }

  // Resolve wallet
  let walletId = null;
  if (!wParam || wParam === 'active') {
    walletId = db.settings.activeWalletId || db.wallets[0].id;
  } else {
    // Tìm theo ID trước
    const byId = db.wallets.find(w => w.id === wParam);
    if (byId) walletId = byId.id;
    else {
      // Tìm theo tên (case-insensitive, không dấu)
      const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      const target = norm(decodeURIComponent(wParam));
      const byName = db.wallets.find(w => norm(w.name) === target);
      if (byName) walletId = byName.id;
    }
  }
  if (!walletId) return showError('Không tìm thấy ví "' + decodeURIComponent(wParam) + '".');

  // Tạo và lưu giao dịch
  const tx = {
    id: uid(), walletId, type, amount, category, note,
    date: todayStr(),
    time: pad(new Date().getHours()) + ':' + pad(new Date().getMinutes())
  };
  db.transactions.push(tx);
  db.settings.activeWalletId = walletId;
  saveDB(db);

  const wallet = db.wallets.find(w => w.id === walletId);
  const catObj = (db.categories.expense || DEFAULT_CATS).find(c => c.name === category) || {icon:'📦'};

  // Push cloud (nếu có)
  let synced = false;
  if (fbUser && fbStore) {
    try { await pushCloud(db, fbUser, fbStore); synced = true; } catch(e){}
  }

  // Show success
  showResult(`
    <div class="icon">${catObj.icon}</div>
    <div class="title">${type==='income'?'+ Đã thu':'✓ Đã lưu'}</div>
    <div class="amount">${type==='income'?'+':'−'}${fmt(amount)}</div>
    <div class="detail">${category}${note?' · '+note:''}<br>
      ${wallet.icon||'💼'} ${wallet.name} ${synced?'· ☁️ đã sync':''}
    </div>
    <div class="btn-row">
      <a href="zap.html${location.search}" class="btn btn-primary">⚡ Lưu lại</a>
      <a href="quick-add.html" class="btn">Ghi nhanh</a>
      <a href="rolly-finance-app.html" class="btn">Mở app</a>
    </div>
    <div class="hint">Có thể đóng tab này</div>
  `);
}
run();
</script>
</body>
</html>
